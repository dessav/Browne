    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #2A140F; /* Marrom escuro */
            background-image: radial-gradient(rgba(212, 175, 55, 0.1) 1px, transparent 1px),
                              radial-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #FFFFFF; /* Branco */
        }

        /* Animações e Transições Fluídas */
        .animate-pulse-gold {
            animation: pulseGold 2.5s infinite;
        }
        @keyframes pulseGold {
            0%, 100% {
                box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
                border-color: rgba(212, 175, 55, 0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
                border-color: rgba(212, 175, 55, 0.9);

        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar customizada estilo chocolateria gourmet */
        ::-webkit-scrollbar {

        }
        ::-webkit-scrollbar-track {
            background: #1B0B08;

        ::-webkit-scrollbar-thumb {

        }
        ::-webkit-scrollbar-thumb:hover {

    <!-- Carregando React 18 e Babel 7 Standalone do Cloudflare CDN para carregamento rápido livre de travamentos -->

    <!-- Script de lógica e renderização principal do sistema Brownê -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Base de Dados Inicial - Clientes Premium
        const INITIAL_CLIENTS = [
            { id: 1, name: "Maria Clara Souza", email: "maria.clara@gmail.com", phone: "(11) 98765-4321", totalPurchases: 14, totalSpent: 266.00 },
            { id: 2, name: "Guilherme Santos", email: "guilherme.s@yahoo.com.br", phone: "(11) 99887-1122", totalPurchases: 9, totalSpent: 161.50 },
            { id: 3, name: "Ana Beatriz Ramos", email: "anabeatriz@outlook.com", phone: "(21) 97654-3210", totalPurchases: 22, totalSpent: 420.00 },
            { id: 4, name: "Carlos Eduardo Oliva", email: "cadu.oliva@gmail.com", phone: "(19) 98123-4567", totalPurchases: 5, totalSpent: 95.00 },
        ];

        // Base de Dados Inicial - Sabores de Brownies no Balcão (Estoque Pronto)
        const INITIAL_PRODUCTS = [
            { id: 1, name: "Brownie Belga Tradicional", category: "Clássicos", price: 12.00, cost: 3.80, stock: 32, salesCount: 148, icon: "🍫" },
            { id: 2, name: "Brownie Recheado Doce de Leite", category: "Recheados", price: 16.00, cost: 5.20, stock: 15, salesCount: 92, icon: "🍯" },
            { id: 3, name: "Brownie Ninho & Nutella", category: "Gourmet", price: 18.00, cost: 6.10, stock: 12, salesCount: 110, icon: "🌰" },
            { id: 4, name: "Blondie de Pistache", category: "Especiais", price: 21.00, cost: 8.40, stock: 8, salesCount: 45, icon: "💚" },
            { id: 5, name: "Brownie Fit (Sem Glúten/Lactose)", category: "Especiais", price: 15.00, cost: 5.50, stock: 5, salesCount: 30, icon: "🌱" },
        ];

        // Base de Dados Inicial - Insumos e Matérias-Primas (Estoque Depósito)
        const INITIAL_INGREDIENTS = [
            { id: 1, name: "Chocolate Belga 70%", unit: "kg", cost: 85.00, stock: 14.5, minStock: 5.0 },
            { id: 2, name: "Nutella Original", unit: "kg", cost: 60.00, stock: 7.2, minStock: 3.0 },
            { id: 3, name: "Doce de Leite", unit: "kg", cost: 22.00, stock: 12.0, minStock: 4.0 },
            { id: 4, name: "Pistache Inteiro", unit: "kg", cost: 210.00, stock: 1.8, minStock: 1.0 },
            { id: 5, name: "Manteiga Sem Sal", unit: "kg", cost: 38.00, stock: 9.5, minStock: 3.0 },
            { id: 6, name: "Açúcar Refinado", unit: "kg", cost: 5.50, stock: 25.0, minStock: 8.0 },
            { id: 7, name: "Farinha de Trigo", unit: "kg", cost: 6.00, stock: 20.0, minStock: 8.0 },
            { id: 8, name: "Caixa Kraft de Presente", unit: "un", cost: 1.25, stock: 110, minStock: 30 }
        ];

        // Registro de Pedidos Históricos e Ativos
        const INITIAL_ORDERS = [
            {
                id: 1001,
                customer: "Maria Clara Souza",
                phone: "(11) 98765-4321",
                items: "3x Brownie Belga Tradicional, 2x Ninho & Nutella",
                total: 72.00,
                status: "Pronto",
                timestamp: "12/07/2026 09:15",
                type: "Balcão",
                paymentStatus: "Pago",
                paymentMethod: "Pix",
                paymentDetails: { signal: 0, balance: 0 }
            },
            {
                id: 1002,
                customer: "Ana Beatriz Ramos",
                phone: "(21) 97654-3210",
                items: "15x Mini Brownie Sortidos (Encomenda Evento)",
                total: 180.00,
                status: "Em Produção",
                timestamp: "12/07/2026 10:00",
                type: "Encomenda",
                preOrderDate: "12/07/2026",
                preOrderTime: "11:30", 
                notes: "Embalagem em caixa kraft com laço de cetim dourado.",
                paymentStatus: "Pago Sinal",
                paymentMethod: "Pix",
                paymentDetails: { signal: 90.00, balance: 90.00 }
            },
            {
                id: 1003,
                customer: "Marcos Paulo Costa",
                phone: "(11) 96155-0044",
                items: "4x Blondie de Pistache",
                total: 84.00,
                status: "Recebido",
                timestamp: "12/07/2026 10:45",
                type: "Balcão",
                paymentStatus: "Em aberto",
                paymentMethod: "Dinheiro",
                paymentDetails: { signal: 0, balance: 84.00 }
            }
        ];

        // Lançamentos Financeiros (Fluxo de Caixa)
        const INITIAL_FINANCES = [
            { id: 2001, date: "12/07/2026", type: "Entrada", category: "Venda PDV", value: 72.00, description: "Venda PDV Cupom #1001" },
            { id: 2002, date: "12/07/2026", type: "Entrada", category: "Encomenda", value: 90.00, description: "Sinal do Pedido #1002 (Ana Beatriz)" },
            { id: 2003, date: "11/07/2026", type: "Saída", category: "Custos Operacionais", value: 340.00, description: "Compra de Chocolate e Insumos" },
            { id: 2004, date: "10/07/2026", type: "Saída", category: "Custos Operacionais", value: 120.00, description: "Embalagens de presente e fitas" },
            { id: 2005, date: "09/07/2026", type: "Entrada", category: "Aporte", value: 500.00, description: "Aporte de caixa inicial semanal" },
        ];

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            
            // Controle de abas e recolhimento do menu lateral
            const [activeTab, setActiveTab] = useState("dashboard"); // dashboard, pdv, pedidos, financeiro, estoque, clientes, relatorios
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            
            const [pdvSubTab, setPdvSubTab] = useState("vender"); // vender, estoque-prontos
            const [estoqueSubTab, setEstoqueSubTab] = useState("insumos"); // insumos, produtos

            const [systemTime, setSystemTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => {
                    setSystemTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const formatSystemTime = (date) => {
                return date.toLocaleString('pt-BR', {
                    day: '2-digit',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            };

            // Bancos de Dados Principais em State do React
            const [clients, setClients] = useState(INITIAL_CLIENTS);
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [ingredients, setIngredients] = useState(INITIAL_INGREDIENTS);
            const [orders, setOrders] = useState(INITIAL_ORDERS);
            const [finances, setFinances] = useState(INITIAL_FINANCES);

            // Modais e Controles do Usuário
            const [customModal, setCustomModal] = useState({ isOpen: false, title: "", message: "", type: "info" });
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });
            const [tempPhone, setTempPhone] = useState("");
            
            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 3500);
            };

            // Sound Effects Synth (Web Audio API)
            const playSound = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    if (type === 'success') {
                        osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                        osc.start();
                        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.08); // A5
                        setTimeout(() => {
                            osc.stop();
                            ctx.close();
                        }, 250);
                    } else if (type === 'oven') {
                        osc.frequency.setValueAtTime(1046.50, ctx.currentTime); // C6
                        gain.gain.setValueAtTime(0.08, ctx.currentTime);
                        osc.start();
                        setTimeout(() => {
                            osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.1); // E6
                        }, 100);
                        setTimeout(() => {
                            osc.stop();
                            ctx.close();
                        }, 300);
                    } else if (type === 'error') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, ctx.currentTime);
                        gain.gain.setValueAtTime(0.12, ctx.currentTime);
                        osc.start();
                        setTimeout(() => {
                            osc.stop();
                            ctx.close();
                        }, 250);
                    } else {
                        osc.frequency.setValueAtTime(440, ctx.currentTime);
                        gain.gain.setValueAtTime(0.04, ctx.currentTime);
                        osc.start();
                        setTimeout(() => {
                            osc.stop();
                            ctx.close();
                        }, 50);
                    }
                } catch (e) {
                    console.log("AudioContext não suportado ou bloqueado", e);
                }
            };

            const triggerCustomModal = (title, message, type = "info") => {
                setCustomModal({ isOpen: true, title, message, type });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setIsAuthenticated(true);
                playSound('success');
                showToast("Seja bem-vindo de volta à Brownê! 🍫✨");
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setUsername("");
                setPassword("");
            };

            // Estados de cadastro e gerenciamento de sabor
            const [showProductModal, setShowProductModal] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [prodName, setProdName] = useState("");
            const [prodCategory, setProdCategory] = useState("Clássicos");
            const [prodPrice, setProdPrice] = useState("");
            const [prodCost, setProdCost] = useState("");
            const [prodStock, setProdStock] = useState("");
            const [prodIcon, setProdIcon] = useState("🍫");

            const handleSaveProduct = (e) => {
                e.preventDefault();
                if (!prodName || !prodPrice || !prodCost) {
                    playSound('error');
                    showToast("Por favor, preencha os campos obrigatórios.", "error");
                    return;
                }

                const priceNum = parseFloat(prodPrice) || 0;
                const costNum = parseFloat(prodCost) || 0;
                const stockNum = parseInt(prodStock) || 0;

                if (editingProduct) {
                    setProducts(products.map(p => p.id === editingProduct.id ? {
                        ...p,
                        name: prodName,
                        category: prodCategory,
                        price: priceNum,
                        cost: costNum,
                        stock: stockNum,
                        icon: prodIcon
                    } : p));
                    showToast("Sabor gourmet atualizado com sucesso!");
                } else {
                    const newProd = {
                        id: Date.now(),
                        name: prodName,
                        category: prodCategory,
                        price: priceNum,
                        cost: costNum,
                        stock: stockNum,
                        salesCount: 0,
                        icon: prodIcon
                    };
                    setProducts([...products, newProd]);
                    showToast("Novo sabor de brownie adicionado ao menu!");
                }
                
                setShowProductModal(false);
                setEditingProduct(null);
                setProdName("");
                setProdPrice("");
                setProdCost("");
                setProdStock("");
            };

            const handleDeleteProduct = (id) => {
                setProducts(products.filter(p => p.id !== id));
                showToast("Sabor removido do catálogo de prontos.", "warning");
            };

            const handleEditProductClick = (prod) => {
                setEditingProduct(prod);
                setProdName(prod.name);
                setProdCategory(prod.category);
                setProdPrice(prod.price);
                setProdCost(prod.cost);
                setProdStock(prod.stock);
                setProdIcon(prod.icon);
                setShowProductModal(true);
            };

            // Insumos
            const [showIngredientModal, setShowIngredientModal] = useState(false);
            const [editingIngredient, setEditingIngredient] = useState(null);
            const [ingName, setIngName] = useState("");
            const [ingUnit, setIngUnit] = useState("kg");
            const [ingCost, setIngCost] = useState("");
            const [ingStock, setIngStock] = useState("");
            const [ingMinStock, setIngMinStock] = useState("");

            const handleSaveIngredient = (e) => {
                e.preventDefault();
                if (!ingName || !ingCost) {
                    playSound('error');
                    showToast("Informe pelo menos o nome e o custo do insumo.", "error");
                    return;
                }

                const costNum = parseFloat(ingCost) || 0;
                const stockNum = parseFloat(ingStock) || 0;
                const minStockNum = parseFloat(ingMinStock) || 0;

                if (editingIngredient) {
                    setIngredients(ingredients.map(i => i.id === editingIngredient.id ? {
                        ...i,
                        name: ingName,
                        unit: ingUnit,
                        cost: costNum,
                        stock: stockNum,
                        minStock: minStockNum
                    } : i));
                    showToast("Insumo atualizado no depósito!");
                } else {
                    const newIng = {
                        id: Date.now(),
                        name: ingName,
                        unit: ingUnit,
                        cost: costNum,
                        stock: stockNum,
                        minStock: minStockNum
                    };
                    setIngredients([...ingredients, newIng]);
                    showToast("Novo insumo registrado no depósito!");
                }

                setShowIngredientModal(false);
                setEditingIngredient(null);
                setIngName("");
                setIngCost("");
                setIngStock("");
                setIngMinStock("");
            };

            const handleDeleteIngredient = (id) => {
                setIngredients(ingredients.filter(i => i.id !== id));
                showToast("Insumo removido do depósito.", "warning");
            };

            const handleEditIngredientClick = (ing) => {
                setEditingIngredient(ing);
                setIngName(ing.name);
                setIngUnit(ing.unit);
                setIngCost(ing.cost);
                setIngStock(ing.stock);
                setIngMinStock(ing.minStock);
                setShowIngredientModal(true);
            };

            const handleQuickAdjustIngredient = (id, delta) => {
                setIngredients(ingredients.map(ing => {
                    if (ing.id === id) {
                        const newStock = Math.max(0, ing.stock + delta);
                        if (newStock <= ing.minStock && ing.stock > ing.minStock) {
                            showToast(`Abastecimento crítico! ${ing.name} atingiu limite mínimo.`, "warning");
                        }
                        return { ...ing, stock: parseFloat(newStock.toFixed(2)) };
                    }
                    return ing;
                }));
                playSound();
            };

            const handleQuickAdjustProductStock = (id, delta) => {
                setProducts(products.map(prod => {
                    if (prod.id === id) {
                        return { ...prod, stock: Math.max(0, prod.stock + delta) };
                    }
                    return prod;
                }));
                playSound();
            };

            // PDV de Caixa e Sacola de Vendas
            const [cart, setCart] = useState([]);
            const [selectedClient, setSelectedClient] = useState("");
            const [orderNotes, setOrderNotes] = useState("");
            const [isPreOrder, setIsPreOrder] = useState(false);
            const [preOrderDate, setPreOrderDate] = useState("12/07/2026");
            const [preOrderTime, setPreOrderTime] = useState("");
            const [paymentStatus, setPaymentStatus] = useState("Pago"); // Pago, Em aberto, Pago Sinal
            const [paymentMethod, setPaymentMethod] = useState("Pix"); // Dinheiro, Pix, Débito, Crédito
            const [signalPaid, setSignalPaid] = useState("");
            const [showReceipt, setShowReceipt] = useState(null);

            const handleAddToCart = (product) => {
                if (product.stock <= 0) {
                    playSound('error');
                    showToast("Este sabor está esgotado no balcão!", "warning");
                    return;
                }

                const existing = cart.find(item => item.product.id === product.id);
                if (existing) {
                    if (existing.qty >= product.stock) {
                        playSound('error');
                        showToast(`Limite máximo de estoque atingido (${product.stock} un).`, "warning");
                        return;
                    }
                    setCart(cart.map(item => item.product.id === product.id ? { ...item, qty: item.qty + 1 } : item));
                } else {
                    setCart([...cart, { product, qty: 1 }]);
                }
                playSound();
            };

            const handleRemoveFromCart = (productId) => {
                const existing = cart.find(item => item.product.id === productId);
                if (existing && existing.qty > 1) {
                    setCart(cart.map(item => item.product.id === productId ? { ...item, qty: item.qty - 1 } : item));
                } else {
                    setCart(cart.filter(item => item.product.id !== productId));
                }
                playSound();
            };

            const calculateCartTotal = () => {
                return cart.reduce((total, item) => total + (item.product.price * item.qty), 0);
            };

            // Checkout da Frente de Caixa (Faturamento de Venda)
            const handleCheckout = (e) => {
                e.preventDefault();
                if (cart.length === 0) {
                    playSound('error');
                    showToast("Sua sacola de compras está vazia!", "error");
                    return;
                }

                const totalValue = calculateCartTotal();
                const itemsSummary = cart.map(item => `${item.qty}x ${item.product.name}`).join(", ");
                const customerName = selectedClient || "Cliente Balcão";

                // Gerenciar controle de caixa e sinal se for Pago Sinal
                let signalNum = 0;
                let balanceNum = 0;

                if (paymentStatus === "Pago Sinal") {
                    signalNum = parseFloat(signalPaid) || 0;
                    if (signalNum <= 0 || signalNum >= totalValue) {
                        playSound('error');
                        showToast("O sinal deve ser maior que zero e menor que o valor total.", "error");
                        return;
                    }
                    balanceNum = totalValue - signalNum;
                } else if (paymentStatus === "Em aberto") {
                    balanceNum = totalValue;
                }

                // Baixar estoque físico dos brownies vendidos
                const updatedProducts = products.map(p => {
                    const cartItem = cart.find(item => item.product.id === p.id);
                    if (cartItem) {
                        return { ...p, stock: p.stock - cartItem.qty, salesCount: p.salesCount + cartItem.qty };
                    }
                    return p;
                });
                setProducts(updatedProducts);

                const clientObj = clients.find(c => c.name === selectedClient);
                const clientPhone = clientObj ? clientObj.phone : "";

                const now = new Date();
                const formattedTimestamp = now.toLocaleString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                // Criar o pedido (Encomenda ou Venda Direta)
                const newOrder = {
                    id: Date.now(),
                    customer: customerName,
                    phone: clientPhone,
                    items: itemsSummary,
                    total: totalValue,
                    status: isPreOrder ? "Recebido" : "Pronto",
                    timestamp: formattedTimestamp,
                    type: isPreOrder ? "Encomenda" : "Balcão",
                    preOrderDate: isPreOrder ? preOrderDate : null,
                    preOrderTime: isPreOrder ? preOrderTime : null,
                    notes: orderNotes || null,
                    paymentStatus: paymentStatus,
                    paymentMethod: paymentMethod, // Método de pagamento salvo
                    paymentDetails: { signal: signalNum, balance: balanceNum }
                };
                setOrders([newOrder, ...orders]);

                // Registrar no Caixa (Se houver valor pago agora)
                const cashReceived = paymentStatus === "Pago" ? totalValue : (paymentStatus === "Pago Sinal" ? signalNum : 0);
                if (cashReceived > 0) {
                    const financeEntry = {
                        id: Date.now() + 1,
                        date: now.toLocaleDateString('pt-BR'),
                        type: "Entrada",
                        category: isPreOrder ? "Encomenda" : "Venda PDV",
                        value: cashReceived,
                        description: `Faturamento ${isPreOrder ? 'Encomenda' : 'Balcão'} de ${customerName} (${paymentMethod})`
                    };
                    setFinances([financeEntry, ...finances]);
                }

                // Incrementa compras do Cliente Premium se registrado
                if (selectedClient) {
                    setClients(clients.map(c => c.name === selectedClient ? {
                        ...c,
                        totalPurchases: c.totalPurchases + 1,
                        totalSpent: c.totalSpent + cashReceived
                    } : c));
                }

                playSound('success');
                setShowReceipt({
                    orderId: newOrder.id,
                    customer: customerName,
                    phone: clientPhone,
                    rawItems: cart,
                    total: totalValue,
                    paymentStatus,
                    paymentMethod, 
                    signal: signalNum,
                    balance: balanceNum,
                    type: newOrder.type,
                    preOrderDate: newOrder.preOrderDate,
                    preOrderTime: newOrder.preOrderTime,
                    timestamp: formattedTimestamp
                });

                // Limpar PDV
                setCart([]);
                setSelectedClient("");
                setOrderNotes("");
                setIsPreOrder(false);
                setPreOrderTime("");
                setPaymentStatus("Pago");
                setPaymentMethod("Pix");
                setSignalPaid("");
            };

            // Atualiza telefone temporário do recibo
            useEffect(() => {
                if (showReceipt) {
                    setTempPhone(showReceipt.phone || "");
                }
            }, [showReceipt]);

            const handleSendWhatsApp = () => {
                if (!showReceipt) return;
                
                let message = `*BROWNÊ - CHOCOLATERIA* 🍫✨\n`;
                message += `*Cupom Fiscal:* #${showReceipt.orderId}\n`;
                message += `*Data:* ${showReceipt.timestamp}\n`;
                message += `*Cliente:* ${showReceipt.customer}\n`;
                if (showReceipt.type === "Encomenda") {
                    message += `*Agendado para:* ${showReceipt.preOrderDate} às ${showReceipt.preOrderTime}\n`;
                }
                message += `\n*--- DELÍCIAS ADQUIRIDAS ---*\n`;
                showReceipt.rawItems.forEach(item => {
                    message += `• ${item.qty}x ${item.product.name} - R$ ${(item.qty * item.product.price).toFixed(2)}\n`;
                });
                message += `\n*TOTAL:* R$ ${showReceipt.total.toFixed(2)}\n`;
                message += `*Status Pgto:* ${showReceipt.paymentStatus}\n`;
                message += `*Método Pgto:* ${showReceipt.paymentMethod}\n`;
                
                if (showReceipt.paymentStatus === "Pago Sinal") {
                    message += `*Sinal Pago:* R$ ${showReceipt.signal.toFixed(2)}\n`;
                    message += `*Restante:* R$ ${showReceipt.balance.toFixed(2)}\n`;
                }
                message += `\n_Obrigado por escolher a Brownê! Tenha um dia maravilhoso e doce._ 🥰`;
                
                const cleanPhone = tempPhone.replace(/\D/g, "");
                let targetPhone = cleanPhone;
                if (cleanPhone.length > 0) {
                    if (cleanPhone.length === 10 || cleanPhone.length === 11) {
                        targetPhone = "55" + cleanPhone;
                    }
                }
                
                const waUrl = `https://api.whatsapp.com/send?phone=${targetPhone}&text=${encodeURIComponent(message)}`;
                window.open(waUrl, "_blank");
                showToast("Redirecionando para o WhatsApp... 📲");
            };

            const [editingOrder, setEditingOrder] = useState(null);
            const [orderFormCust, setOrderFormCust] = useState("");
            const [orderFormItems, setOrderFormItems] = useState("");
            const [orderFormTotal, setOrderFormTotal] = useState("");
            const [orderFormStatus, setOrderFormStatus] = useState("Recebido");
            const [orderFormPayStatus, setOrderFormPayStatus] = useState("Pago");
            const [orderFormPayMethod, setOrderFormPayMethod] = useState("Pix");
            const [orderFormSignal, setOrderFormSignal] = useState("");

            const handleUpdateOrderStatus = (orderId, newStatus) => {
                setOrders(orders.map(o => o.id === orderId ? { ...o, status: newStatus } : o));
                playSound();
                showToast(`Status do pedido atualizado para: ${newStatus}`);
            };

            // Função para quitar rapidamente um pedido com um clique diretamente no card
            const handleQuickPayOrder = (order) => {
                const balanceToPay = order.paymentStatus === "Pago Sinal" 
                    ? (order.paymentDetails?.balance || 0) 
                    : order.total;

                if (balanceToPay <= 0) return;

                // Atualizar o status do pedido para "Pago"
                setOrders(orders.map(o => o.id === order.id ? {
                    ...o,
                    paymentStatus: "Pago",
                    paymentDetails: { signal: order.total, balance: 0 }
                } : o));

                // Registrar a entrada correspondente no fluxo de caixa
                const now = new Date();
                const financeEntry = {
                    id: Date.now() + 1,
                    date: now.toLocaleDateString('pt-BR'),
                    type: "Entrada",
                    category: order.type === "Encomenda" ? "Encomenda" : "Venda PDV",
                    value: balanceToPay,
                    description: `Quitação Automática de Fila do Pedido #${order.id} (${order.paymentMethod || 'Pix'}) - Cliente: ${order.customer}`
                };

                setFinances(prevFinances => [financeEntry, ...prevFinances]);
                playSound('success');
                showToast(`Pedido #${order.id} quitado com sucesso! R$ ${balanceToPay.toFixed(2)} lançados no caixa.`);
            };

            // Lógica ao salvar alterações de pedidos no modal, lançando no fluxo de caixa se o status mudar para pago
            const handleSaveOrderEdit = (e) => {
                e.preventDefault();
                if (!orderFormCust || !orderFormItems) {
                    playSound('error');
                    showToast("Por favor preencha todos os campos.", "error");
                    return;
                }

                const totalVal = parseFloat(orderFormTotal) || 0;
                let signalNum = 0;
                let balanceNum = 0;

                if (orderFormPayStatus === "Pago Sinal") {
                    signalNum = parseFloat(orderFormSignal) || 0;
                    balanceNum = totalVal - signalNum;
                } else if (orderFormPayStatus === "Em aberto") {
                    balanceNum = totalVal;
                }

                // Detecção inteligente de mudança de status financeiro para lançamento automático
                const originalOrder = orders.find(o => o.id === editingOrder.id);
                const oldStatus = originalOrder ? originalOrder.paymentStatus : "Em aberto";
                const oldSignal = originalOrder && originalOrder.paymentDetails ? originalOrder.paymentDetails.signal : 0;

                let cashToRecord = 0;
                let descriptionText = "";

                if (oldStatus !== "Pago" && orderFormPayStatus === "Pago") {
                    // Quitou totalmente o valor total pendente
                    cashToRecord = totalVal - oldSignal;
                    descriptionText = `Recebimento Quitação do Pedido #${editingOrder.id} (${orderFormPayMethod}) - Cliente: ${orderFormCust}`;
                } else if (oldStatus === "Em aberto" && orderFormPayStatus === "Pago Sinal") {
                    // Pagamento do sinal inicial
                    cashToRecord = signalNum;
                    descriptionText = `Recebimento Sinal do Pedido #${editingOrder.id} (${orderFormPayMethod}) - Cliente: ${orderFormCust}`;
                } else if (oldStatus === "Pago Sinal" && orderFormPayStatus === "Pago Sinal" && signalNum > oldSignal) {
                    // Ajuste de incremento do sinal pago
                    cashToRecord = signalNum - oldSignal;
                    descriptionText = `Ajuste de Sinal do Pedido #${editingOrder.id} (${orderFormPayMethod}) - Cliente: ${orderFormCust}`;
                }

                setOrders(orders.map(o => o.id === editingOrder.id ? {
                    ...o,
                    customer: orderFormCust,
                    items: orderFormItems,
                    total: totalVal,
                    status: orderFormStatus,
                    paymentStatus: orderFormPayStatus,
                    paymentMethod: orderFormPayMethod,
                    paymentDetails: { signal: signalNum, balance: balanceNum }
                } : o));

                // Se houver valor financeiro registrado nesta atualização de status, lança no fluxo de caixa
                if (cashToRecord > 0) {
                    const now = new Date();
                    const financeEntry = {
                        id: Date.now() + 1,
                        date: now.toLocaleDateString('pt-BR'),
                        type: "Entrada",
                        category: editingOrder.type === "Encomenda" ? "Encomenda" : "Venda PDV",
                        value: cashToRecord,
                        description: descriptionText
                    };
                    setFinances(prevFinances => [financeEntry, ...prevFinances]);
                    showToast(`R$ ${cashToRecord.toFixed(2)} lançados automaticamente no fluxo de caixa!`);
                }

                setEditingOrder(null);
                playSound('success');
                showToast("Ficha do pedido editada com sucesso!");
            };

            const handleDeleteOrder = (id) => {
                setOrders(orders.filter(o => o.id !== id));
                showToast("Pedido cancelado e excluído do painel.", "warning");
            };

            const handleOpenOrderEdit = (order) => {
                setEditingOrder(order);
                setOrderFormCust(order.customer);
                setOrderFormItems(order.items);
                setOrderFormTotal(order.total);
                setOrderFormStatus(order.status);
                setOrderFormPayStatus(order.paymentStatus || "Pago");
                setOrderFormPayMethod(order.paymentMethod || "Pix");
                setOrderFormSignal(order.paymentDetails?.signal || "");
            };

            // Clientes VIPs
            const [showClientModal, setShowClientModal] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [clientName, setClientName] = useState("");
            const [clientEmail, setClientEmail] = useState("");
            const [clientPhone, setClientPhone] = useState("");

            const handleSaveClient = (e) => {
                e.preventDefault();
                if (!clientName) {
                    playSound('error');
                    showToast("Informe pelo menos o nome do cliente.", "error");
                    return;
                }

                if (editingClient) {
                    setClients(clients.map(c => c.id === editingClient.id ? {
                        ...c,
                        name: clientName,
                        email: clientEmail,
                        phone: clientPhone
                    } : c));
                    showToast("Ficha de cliente atualizada com sucesso!");
                } else {
                    const newClient = {
                        id: Date.now(),
                        name: clientName,
                        email: clientEmail,
                        phone: clientPhone,
                        totalPurchases: 0,
                        totalSpent: 0
                    };
                    setClients([...clients, newClient]);
                    showToast("Cliente VIP registrado com sucesso!");
                }

                setShowClientModal(false);
                setEditingClient(null);
                setClientName("");
                setClientEmail("");
                setClientPhone("");
            };

            const handleDeleteClient = (id) => {
                setClients(clients.filter(c => c.id !== id));
                showToast("Registro do cliente removido.", "warning");
            };

            const handleOpenClientEdit = (c) => {
                setEditingClient(c);
                setClientName(c.name);
                setClientEmail(c.email);
                setClientPhone(c.phone);
                setShowClientModal(true);
            };

            // Financeiro
            const [showFinanceModal, setShowFinanceModal] = useState(false);
            const [finType, setFinType] = useState("Entrada");
            const [finCategory, setFinCategory] = useState("Venda PDV");
            const [finValue, setFinValue] = useState("");
            const [finDesc, setFinDesc] = useState("");

            const handleAddFinance = (e) => {
                e.preventDefault();
                const valNum = parseFloat(finValue) || 0;
                if (valNum <= 0) {
                    playSound('error');
                    showToast("O valor deve ser maior do que zero.", "error");
                    return;
                }

                const newEntry = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('pt-BR'),
                    type: finType,
                    category: finCategory,
                    value: valNum,
                    description: finDesc || finCategory
                };

                setFinances([newEntry, ...finances]);
                setShowFinanceModal(false);
                setFinValue("");
                setFinDesc("");
                playSound('success');
                showToast("Lançamento financeiro registrado!");
            };

            const handleDeleteFinance = (id) => {
                setFinances(finances.filter(f => f.id !== id));
                showToast("Lançamento estornado do fluxo de caixa.", "warning");
            };

            const [reportPeriod, setReportPeriod] = useState("Mês");
            const [activeUrgentOrders, setActiveUrgentOrders] = useState([]);

            useEffect(() => {
                const checkUrgency = () => {
                    const todayStr = "12/07/2026"; 
                    const nowMinutes = 6 * 60 + 6; // Simulação de hora baseada na sessão (06:06 AM)
                    
                    const urgentList = orders.filter(o => {
                        // Encomendas ativas que NÃO estejam Prontas e NÃO estejam Entregues
                        if (o.type === "Encomenda" && o.status !== "Pronto" && o.status !== "Entregue" && o.preOrderDate === todayStr) {
                            if (o.preOrderTime) {
                                const [h, m] = o.preOrderTime.split(":").map(Number);
                                const deliveryMinutes = h * 60 + m;
                                const diff = deliveryMinutes - nowMinutes;
                                return diff > 0 && diff <= 480; // Menos de 8 horas (480 minutos)
                            }
                        }
                        return false;
                    });
                    setActiveUrgentOrders(urgentList);
                };

                checkUrgency();
                const interval = setInterval(checkUrgency, 20000);
                return () => clearInterval(interval);
            }, [orders]);

            useEffect(() => {
                if (activeUrgentOrders.length > 0 && activeTab === "dashboard") {
                    playSound('oven');
                }
            }, [activeUrgentOrders, activeTab]);

            const calculateTotals = () => {
                let totalIn = 0;
                let totalOut = 0;
                finances.forEach(f => {
                    if (f.type === "Entrada") totalIn += f.value;
                    else totalOut += f.value;
                });
                return { totalIn, totalOut, balance: totalIn - totalOut };
            };

            const { totalIn, totalOut, balance } = calculateTotals();

            // Render do Gráfico de Relatórios no React
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (activeTab === "relatorios" && chartRef.current) {
                    try {
                        if (chartInstance.current) {
                            chartInstance.current.destroy();
                        }

                        const ctx = chartRef.current.getContext('2d');
                        let labels = [];
                        let dataSales = [];

                        if (reportPeriod === "Dia") {
                            labels = ["08:00", "10:00", "12:00", "14:00", "16:00", "18:00"];
                            dataSales = [45, 120, 280, 150, 210, 90];
                        } else if (reportPeriod === "Semana") {
                            labels = ["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"];
                            dataSales = [320, 480, 510, 430, 890, 1200, 350];
                        } else if (reportPeriod === "Mês") {
                            labels = ["Semana 1", "Semana 2", "Semana 3", "Semana 4"];
                            dataSales = [1200, 1850, 2400, totalIn];
                        } else {
                            labels = ["Jan-Mar", "Abr-Jun", "Jul-Set", "Out-Dez"];
                            dataSales = [8500, 12400, 15400, 19200];
                        }

                        chartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Faturamento de Vendas (R$)',
                                    data: dataSales,
                                    borderColor: '#d4af37',
                                    backgroundColor: 'rgba(212, 175, 55, 0.1)',
                                    borderWidth: 3,
                                    fill: true,
                                    tension: 0.3
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { labels: { color: '#ffffff' } }
                                },
                                scales: {
                                    y: { ticks: { color: '#ffffff' }, grid: { color: 'rgba(212, 175, 55, 0.05)' } },
                                    x: { ticks: { color: '#ffffff' }, grid: { color: 'rgba(212, 175, 55, 0.05)' } }
                                }
                            }
                        });
                    } catch (err) {
                        console.log("Erro de inicialização do ChartJS", err);
                    }
                }
            }, [activeTab, reportPeriod, finances, totalIn]);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">

                    {/* MODAL 3: EDIÇÃO DE PEDIDOS DE CLIENTE (COZINHA/VENDAS) */}
                    {editingOrder && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <form onSubmit={handleSaveOrderEdit} className="w-full max-w-md bg-marrom-800 border border-dourado-500/20 p-6 rounded-3xl space-y-4 shadow-2xl">
                                <h3 className="font-serif font-black text-xl text-dourado-400">Modificar Pedido #{editingOrder.id}</h3>
                                
                                <div className="space-y-3">
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Nome do Cliente</span>
                                        <input type="text" value={orderFormCust} onChange={(e) => setOrderFormCust(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500" required />
                                    </div>
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Itens do Pedido</span>
                                        <input type="text" value={orderFormItems} onChange={(e) => setOrderFormItems(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500" required />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Valor Total do Pedido</span>
                                            <input type="number" step="0.01" value={orderFormTotal} onChange={(e) => setOrderFormTotal(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500 font-mono" required />
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Fila da Cozinha</span>
                                            <select value={orderFormStatus} onChange={(e) => setOrderFormStatus(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500">
                                                <option value="Recebido">Recebido</option>
                                                <option value="Em Produção">Em Produção</option>
                                                <option value="Pronto">Pronto</option>
                                                <option value="Entregue">Entregue</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-marrom-900 rounded-2xl space-y-3 border border-dourado-500/5">
                                        <span className="block text-[10px] font-bold text-dourado-400 uppercase tracking-wider font-mono">Status Financeiro</span>
                                        <div className="grid grid-cols-3 gap-2">
                                            {["Pago", "Em aberto", "Pago Sinal"].map(status => (
                                                <button 
                                                    key={status} 
                                                    type="button"
                                                    onClick={() => setOrderFormPayStatus(status)}
                                                    className={`py-1 rounded text-[9px] font-bold uppercase transition-all ${orderFormPayStatus === status ? 'bg-caramelo-500 text-branco-50 font-black' : 'bg-marrom-850 text-branco-100'}`}
                                                >
                                                    {status}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="space-y-1">
                                            <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Meio de Pagamento</span>
                                            <select value={orderFormPayMethod} onChange={(e) => setOrderFormPayMethod(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500">
                                                <option value="Dinheiro">Dinheiro</option>
                                                <option value="Pix">Pix</option>
                                                <option value="Débito">Débito</option>
                                                <option value="Crédito">Crédito</option>
                                            </select>
                                        </div>

                                        {orderFormPayStatus === "Pago Sinal" && (
                                            <div className="space-y-1 animate-fadeIn font-mono">
                                                <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono font-bold">Valor do Sinal Pago</span>
                                                <input type="number" step="0.01" value={orderFormSignal} onChange={(e) => setOrderFormSignal(e.target.value)} className="w-full p-2 bg-marrom-900 rounded text-xs text-right font-mono text-branco-50" />
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="flex gap-2 justify-end pt-3">
                                    <button type="button" onClick={() => setEditingOrder(null)} className="px-4 py-2 bg-marrom-900 hover:bg-marrom-950 text-xs rounded-xl font-bold text-branco-100 transition-colors">Cancelar</button>
                                    <button type="submit" className="px-5 py-2 bg-caramelo-500 text-branco-50 text-xs font-black rounded-xl uppercase hover:bg-caramelo-400 transition-colors">Salvar Alterações</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL 4: CADASTRO/EDIÇÃO DE CLIENTE PREMIUM */}
                    {showClientModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <form onSubmit={handleSaveClient} className="w-full max-w-md bg-marrom-800 border border-dourado-500/20 p-6 rounded-3xl space-y-4 shadow-2xl">
                                <h3 className="font-serif font-black text-xl text-dourado-400">{editingClient ? 'Editar Ficha VIP' : 'Nova Ficha VIP'}</h3>
                                
                                <div className="space-y-3">
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Nome do Cliente</span>
                                        <input type="text" value={clientName} onChange={(e) => setClientName(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500" required />
                                    </div>
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">E-mail</span>
                                        <input type="email" value={clientEmail} onChange={(e) => setClientEmail(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500" />
                                    </div>
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Telefone / WhatsApp</span>
                                        <input type="text" value={clientPhone} onChange={(e) => setClientPhone(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500 font-mono" placeholder="(XX) XXXXX-XXXX" />
                                    </div>
                                </div>

                                <div className="flex gap-2 justify-end pt-3">
                                    <button type="button" onClick={() => setShowClientModal(false)} className="px-4 py-2 bg-marrom-900 hover:bg-marrom-950 text-xs rounded-xl font-bold text-branco-100 transition-colors">Cancelar</button>
                                    <button type="submit" className="px-5 py-2 bg-caramelo-500 text-branco-50 text-xs font-black rounded-xl uppercase hover:bg-caramelo-400 transition-colors">Registrar VIP</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL 5: NOVO LANÇAMENTO FINANCEIRO MANUAL */}
                    {showFinanceModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <form onSubmit={handleAddFinance} className="w-full max-w-md bg-marrom-800 border border-dourado-500/20 p-6 rounded-3xl space-y-4 shadow-2xl">
                                <h3 className="font-serif font-black text-xl text-dourado-400">Novo Lançamento Financeiro</h3>
                                
                                <div className="space-y-3">
                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Tipo de Fluxo</span>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button 
                                                type="button" 
                                                onClick={() => { setFinType("Entrada"); setFinCategory("Venda PDV"); }}
                                                className={`py-2 rounded-xl text-xs font-bold uppercase tracking-wider border transition-all ${finType === "Entrada" ? 'bg-emerald-950 border-emerald-500 text-emerald-400 font-black' : 'border-dourado-500/10 text-branco-100 bg-marrom-900'}`}
                                            >
                                                ▲ Entrada
                                            </button>
                                            <button 
                                                type="button" 
                                                onClick={() => { setFinType("Saída"); setFinCategory("Custos Operacionais"); }}
                                                className={`py-2 rounded-xl text-xs font-bold uppercase tracking-wider border transition-all ${finType === "Saída" ? 'bg-rose-950 border-rose-500 text-rose-400 font-black' : 'border-dourado-500/10 text-branco-100 bg-marrom-900'}`}
                                            >
                                                ▼ Saída
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Categoria</span>
                                            <select 
                                                value={finCategory} 
                                                onChange={(e) => setFinCategory(e.target.value)}
                                                className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500"
                                            >
                                                {finType === "Entrada" ? (
                                                    <>
                                                        <option value="Venda PDV">Venda PDV</option>
                                                        <option value="Encomenda">Encomenda</option>
                                                        <option value="Aporte">Aporte</option>
                                                        <option value="Outros">Outros</option>
                                                    </>
                                                ) : (
                                                    <>
                                                        <option value="Custos Operacionais">Custos Operacionais</option>
                                                        <option value="Marketing">Marketing</option>
                                                        <option value="Outros">Outros</option>
                                                    </>
                                                )}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Valor do Lançamento (R$) *</span>
                                            <input type="number" step="0.01" value={finValue} onChange={(e) => setFinValue(e.target.value)} className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-right font-mono text-branco-50 focus:outline-none focus:border-caramelo-500" required />
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <span className="text-[10px] uppercase tracking-wider font-bold text-branco-200/50 font-mono">Descrição / Notas</span>
                                        <input type="text" value={finDesc} onChange={(e) => setFinDesc(e.target.value)} placeholder="Ex: Compra de formas silicone" className="w-full p-2.5 bg-marrom-900 rounded-xl text-xs border border-dourado-500/10 text-branco-50 focus:outline-none focus:border-caramelo-500" />
                                    </div>
                                </div>

                                <div className="flex gap-2 justify-end pt-3">
                                    <button type="button" onClick={() => setShowFinanceModal(false)} className="px-4 py-2 bg-marrom-900 hover:bg-marrom-950 text-xs rounded-xl font-bold text-branco-100 transition-all">Cancelar</button>
                                    <button type="submit" className="px-5 py-2 bg-caramelo-500 text-branco-50 text-xs font-black rounded-xl uppercase transition-all hover:bg-caramelo-400">Registrar</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL 6: RECIBO TÉRMICO DE VENDA DO PDV */}
                    {showReceipt && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="w-full max-w-xs bg-white text-marrom-950 p-6 rounded-3xl space-y-4 shadow-2xl font-mono text-xs">
                                <div className="text-center space-y-1 border-b border-dashed border-marrom-950/20 pb-4">
                                    <h3 className="font-serif font-black text-lg uppercase tracking-wide">BROWNÊ</h3>
                                    <p className="text-[9px] uppercase tracking-wider">Chocolateria Artesanal</p>
                                    <p className="text-[8px] text-marrom-950/60 font-sans">Tel: (11) 95132-2009</p>
                                </div>

                                <div className="space-y-1 text-[9px] text-marrom-950/70 border-b border-dashed border-marrom-950/20 pb-3">
                                    <p>CUPOM FISCAL: #{showReceipt.orderId}</p>
                                    <p>DATA: {showReceipt.timestamp}</p>
                                    <p>OPERADOR: Master Chocolatier</p>
                                    <p>CLIENTE: {showReceipt.customer}</p>
                                    <p className="font-bold">STATUS FINANCEIRO: {showReceipt.paymentStatus}</p>
                                    <p className="font-bold">FORMA DE PAGAMENTO: {showReceipt.paymentMethod}</p>
                                    {showReceipt.type === "Encomenda" && (
                                        <p className="text-purple-700 font-bold">ENCOMENDA: {showReceipt.preOrderDate} às {showReceipt.preOrderTime}</p>
                                    )}
                                </div>

                                <div className="space-y-1.5 py-2">
                                    {showReceipt.rawItems && showReceipt.rawItems.map((item, idx) => (
                                        <div key={idx} className="flex justify-between text-[10px]">
                                            <span>{item.qty}x {item.product.name}</span>
                                            <span>R$ {(item.qty * item.product.price).toFixed(2)}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="border-t border-dashed border-marrom-950/20 pt-3 space-y-1 font-bold">
                                    <div className="flex justify-between">
                                        <span>SUBTOTAL</span>
                                        <span>R$ {showReceipt.total.toFixed(2)}</span>
                                    </div>
                                    <div className="flex justify-between text-marrom-900 text-sm">
                                        <span>TOTAL PAGO</span>
                                        <span>R$ {showReceipt.total.toFixed(2)}</span>
                                    </div>
                                    {showReceipt.paymentStatus === "Pago Sinal" && (
                                        <div className="text-[9px] text-rose-700 bg-rose-50 p-1.5 rounded space-y-0.5 mt-1 font-sans">
                                            <p className="flex justify-between font-mono"><span>SINAL PAGO:</span> <span>R$ {showReceipt.signal.toFixed(2)}</span></p>
                                            <p className="flex justify-between font-black font-mono"><span>RESTA PAGAR:</span> <span>R$ {showReceipt.balance.toFixed(2)}</span></p>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-2 pt-3 border-t border-dashed border-marrom-950/20 text-left">
                                    <span className="block text-[9px] font-black uppercase text-marrom-950/60 font-sans">Enviar WhatsApp do Cliente</span>
                                    <div className="flex gap-1.5">
                                        <input 
                                            type="text" 
                                            placeholder="(11) 99999-9999" 
                                            value={tempPhone}
                                            onChange={(e) => setTempPhone(e.target.value)}
                                            className="w-full px-2.5 py-1.5 border border-marrom-950/30 rounded-xl text-[10px] text-marrom-950 bg-white focus:outline-none focus:border-emerald-600 transition-colors font-mono"
                                        />
                                        <button 
                                            type="button" 
                                            onClick={handleSendWhatsApp}
                                            className="px-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl flex items-center justify-center text-xs transition-all hover:scale-105"
                                            title="Enviar por WhatsApp"
                                        >
                                            <i className="fa-brands fa-whatsapp text-sm"></i>
                                        </button>
                                    </div>
                                </div>

                                <div className="text-center pt-4 border-t border-dashed border-marrom-950/20 text-[9px] text-marrom-950/50 space-y-1 font-sans">
                                    <p>Obrigado pela preferência! 🍫✨</p>
                                    <button 
                                        type="button" 
                                        onClick={() => setShowReceipt(null)}
                                        className="mt-4 w-full py-2 bg-marrom-800 text-branco-50 font-bold rounded-xl text-[10px] uppercase tracking-wider font-mono hover:bg-marrom-900 transition-colors"
                                    >
                                        Fechar Cupom
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL 7: MODAL FLUTUANTE CUSTOMIZADO */}
                    {customModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="w-full max-w-md bg-marrom-800 border border-dourado-500/20 p-6 rounded-3xl text-center space-y-4 shadow-2xl">
                                <span className="text-4xl block">
                                    {customModal.type === 'success' ? '🎉' : customModal.type === 'error' ? '⚠️' : 'ℹ️'}
                                </span>
                                <h3 className="font-serif font-black text-xl text-dourado-400">{customModal.title}</h3>
                                <p className="text-xs text-branco-100 whitespace-pre-line leading-relaxed">{customModal.message}</p>
                                <button 
                                    onClick={() => setCustomModal({ ...customModal, isOpen: false })}
                                    className="px-6 py-2.5 bg-caramelo-500 text-branco-50 text-xs font-black uppercase tracking-wider rounded-xl hover:bg-caramelo-400 transition-colors shadow"
                                >
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}

                    {/* TOAST NOTIFICATION GERAL */}
                    {toast.show && (
                        <div className={`fixed bottom-4 right-4 px-4 py-3 rounded-2xl shadow-2xl border flex items-center gap-3 z-50 animate-fadeIn ${
                            toast.type === "success" ? "bg-emerald-950 border-emerald-500/30 text-emerald-300" : 
                            toast.type === "warning" ? "bg-yellow-950 border-yellow-500/30 text-yellow-300" : "bg-rose-950 border-rose-500/30 text-rose-300"
                        }`}>
                            <i className={`fa-solid ${
                                toast.type === "success" ? "fa-circle-check" : 
                                toast.type === "warning" ? "fa-circle-exclamation" : "fa-circle-xmark"
                            }`}></i>
                            <span className="text-xs font-bold">{toast.message}</span>
                        </div>
                    )}

                </div>
            );
        }

        // Render do React 18 compatível e livre de avisos de console
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
